<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DentalPro{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-slate-50">
    <!-- Sidebar mínimo -->
    <div class="flex h-screen">
        <div class="w-64 bg-white shadow-lg hidden md:flex flex-col p-4">
            <div class="text-2xl font-bold text-teal-600 mb-8">DentalPro</div>
            <nav class="flex-1 space-y-2">
                <a href="{% url 'pacientes:list' %}" class="block px-4 py-2 rounded hover:bg-slate-100">
                    <i data-lucide="users"></i>
                    Pacientes
                </a>
            </nav>
        </div>
        
        <!-- Main content -->
        <main class="flex-1 overflow-auto">
            <div class="p-6">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
    
    <script>
        lucide.createIcons();
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
