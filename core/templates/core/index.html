{% extends 'core/base.html' %}

{% block title %}Inicio - DentalPro{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <h1 class="text-4xl font-bold text-slate-900 mb-4">Bienvenido a DentalPro</h1>
    <p class="text-lg text-slate-600 mb-8">
        Sistema de gestión dental con HTMX y Django.
    </p>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <a href="{% url 'pacientes:list' %}" class="block p-6 bg-white rounded-lg shadow hover:shadow-lg transition">
            <h2 class="text-xl font-bold text-teal-600 mb-2">Gestionar Pacientes</h2>
            <p class="text-slate-600">Ver lista completa de pacientes y crear nuevos registros.</p>
        </a>
    </div>
</div>
{% endblock %}
